# Back Office CodeBuild deploy config
# Used only inside CI/CD to allow dashboard sync without relying on an
# untracked local config/backoffice.yaml.

runner:
  command: "codex"
  mode: "stdin-text"

deploy:
  provider: bunny
  bunny:
    storage_zone: "admin-codyjo-site"
    storage_region: "ny"
    # storage_key: set via BUNNY_STORAGE_KEY env var
    dashboard_targets:
      - cdn_id: ""
        base_path: ""
        subdomain: "admin.codyjo.com"
        filter_repo: null
        allow_public_read: false
      - cdn_id: ""
        base_path: "back-office/dashboard"
        subdomain: "www.codyjo.com"
        filter_repo: null
        allow_public_read: false

targets:
  back-office:
    path: "."
    language: python
    default_departments: [qa]
    lint_command: "make test"
    test_command: "make test"
    coverage_command: ""
    deploy_command: "bash scripts/sync-dashboard.sh"
    context: |
      Back Office dashboard publishing config for CodeBuild.
