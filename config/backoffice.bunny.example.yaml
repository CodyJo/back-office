# Back Office — Bunny.net Deploy Configuration (Example / Template)
# Copy to config/backoffice.yaml and fill in your values.
# DO NOT commit backoffice.yaml — it contains secrets and local paths.

runner:
  command: "claude --model haiku"
  mode: "claude-print"

api:
  port: 8070
  api_key: ""
  allowed_origins:
    - "https://admin.yoursite.com"
    - "http://localhost:8070"

deploy:
  provider: bunny
  bunny:
    storage_zone: "your-storage-zone"
    storage_region: "ny"         # ny | la | sg | syd | uk | se | br | jh
    # storage_key: set via BUNNY_STORAGE_KEY env var (preferred) or inline
    dashboard_targets:
      - cdn_id: "123456"
        base_path: ""
        subdomain: "admin.yoursite.com"
        filter_repo: null
        allow_public_read: false
      - cdn_id: "789012"
        base_path: "back-office/dashboard"
        subdomain: "www.yoursite.com"
        filter_repo: null
        allow_public_read: false

scan:
  run_linter: true
  run_tests: true
  security_audit: true
  performance_review: true
  code_quality: true
  min_severity: low
  max_findings: 200
  exclude_patterns:
    - "node_modules/**"
    - "venv/**"
    - ".git/**"
    - "*.min.js"

fix:
  auto_fix_severity: high
  run_tests_after_fix: true
  run_linter_after_fix: true
  max_parallel_fixes: 4
  auto_commit: true
  auto_push: false

notifications:
  sync_to_storage: true

targets:
  my-project:
    path: /path/to/my-project
    language: python
    default_departments: [qa, seo, ada, compliance, monetization, product]
    lint_command: "ruff check ."
    test_command: "python3 -m pytest"
    coverage_command: "python3 -m pytest --cov=. --cov-report=json:coverage.json"
    deploy_command: "bash scripts/deploy.sh"
    context: |
      Brief description of this project for the AI agent.
