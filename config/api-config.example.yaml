# Back Office API Server Configuration
# Copy to api-config.yaml and customize.

# Port the API server listens on
port: 8070

# API key for authenticating requests (leave empty to disable auth)
# Generate one: python3 -c "import secrets; print(secrets.token_urlsafe(32))"
api_key: ""

# Allowed CORS origins (dashboards that can call the API)
allowed_origins:
  - "https://admin.thenewbeautifulme.com"
  - "http://localhost:8070"

# Target repositories — maps site name to local repo path
# The dashboard sends a "site" hint; the API resolves it to a path here.
targets:
  thenewbeautifulme: "/home/merm/projects/thenewbeautifulme"
  photo-gallery: "/home/merm/projects/photo-gallery"
  codyjo.com: "/home/merm/projects/codyjo.com"
