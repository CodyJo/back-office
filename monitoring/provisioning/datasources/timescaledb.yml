apiVersion: 1

datasources:
  - name: TimescaleDB
    type: postgres
    access: proxy
    uid: timescaledb
    url: timescaledb:5432
    user: vector
    jsonData:
      database: monitoring
      sslmode: disable
      maxOpenConns: 10
      maxIdleConns: 5
      connMaxLifetime: 14400
      postgresVersion: 1600
      timescaledb: true
    secureJsonData:
      password: ${TSDB_PASSWORD}
    isDefault: true
