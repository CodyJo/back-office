apiVersion: 1

groups:
  - orgId: 1
    name: Infrastructure Alerts
    folder: Alerts
    interval: 1m
    rules:
      - uid: disk-critical
        title: Disk Critical (>90%)
        condition: C
        for: 5m
        noDataState: NoData
        execErrState: Error
        annotations:
          summary: Disk usage above 90%
        labels:
          severity: critical
        data:
          - refId: A
            datasourceUid: timescaledb
            relativeTimeRange:
              from: 21600
              to: 0
            model:
              datasource:
                type: postgres
                uid: timescaledb
              editorMode: code
              format: time_series
              intervalMs: 60000
              maxDataPoints: 43200
              rawQuery: true
              rawSql: |
                SELECT bucket AS time, labels->>'device' AS metric,
                       avg_val / NULLIF((SELECT avg_val
                         FROM metrics_5m m2
                         WHERE m2.metric = 'disk_total_bytes'
                           AND m2.labels->>'device' = metrics_5m.labels->>'device'
                           AND $__timeFilter(m2.bucket)
                         ORDER BY m2.bucket DESC
                         LIMIT 1), 0) AS value
                FROM metrics_5m
                WHERE metric = 'disk_used_bytes'
                  AND $__timeFilter(bucket)
                ORDER BY bucket
              refId: A
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params: [0.9]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 60000
              maxDataPoints: 43200
              refId: C
              type: threshold

      - uid: disk-warning
        title: Disk Warning (>85%)
        condition: C
        for: 10m
        noDataState: NoData
        execErrState: Error
        annotations:
