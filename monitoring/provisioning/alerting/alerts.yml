        data:
          - refId: A
            datasourceUid: timescaledb
            relativeTimeRange:
              from: 21600
              to: 0
            model:
              datasource:
                type: postgres
                uid: timescaledb
              editorMode: code
              format: time_series
              intervalMs: 60000
              maxDataPoints: 43200
              rawQuery: true
              rawSql: |
                SELECT bucket AS time, labels->>'device' AS metric,
                       avg_val / NULLIF((SELECT avg_val
                         FROM metrics_5m m2
                         WHERE m2.metric = 'disk_total_bytes'
                           AND m2.labels->>'device' = metrics_5m.labels->>'device'
                           AND $__timeFilter(m2.bucket)
                         ORDER BY m2.bucket DESC
                         LIMIT 1), 0) AS value
                FROM metrics_5m
                WHERE metric = 'disk_used_bytes'
                  AND $__timeFilter(bucket)
                ORDER BY bucket
              refId: A
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params: [0.85]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 60000
              maxDataPoints: 43200
              refId: C
              type: threshold

      - uid: gpu-thermal
        title: GPU Thermal (>83C)
        condition: C
        for: 2m
        noDataState: NoData
        execErrState: Error
        annotations:
          summary: RTX 3080 temperature exceeds 83C
        labels:
          severity: critical
        data:
          - refId: A
            datasourceUid: timescaledb
            relativeTimeRange:
              from: 21600
              to: 0
            model:
              datasource:
                type: postgres
                uid: timescaledb
              editorMode: code
              format: time_series
              intervalMs: 60000
              maxDataPoints: 43200
              rawQuery: true
              rawSql: |
                SELECT bucket AS time, avg_val AS value
                FROM metrics_5m
                WHERE metric = 'gpu_temp_celsius'
                  AND $__timeFilter(bucket)
                ORDER BY bucket
              refId: A
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params: [83]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 60000
              maxDataPoints: 43200
              refId: C
              type: threshold

      - uid: gpu-throttling
        title: GPU Throttling
        condition: C
        for: 1m
        noDataState: NoData
        execErrState: Error
        annotations:
          summary: GPU clock throttling active (thermal or power cap)
        labels:
          severity: warning
        data:
          - refId: A
            datasourceUid: timescaledb
            relativeTimeRange:
              from: 21600
              to: 0
            model:
              datasource:
                type: postgres
                uid: timescaledb
              editorMode: code
              format: time_series
              intervalMs: 60000
              maxDataPoints: 43200
              rawQuery: true
              rawSql: |
                SELECT bucket AS time,
                       greatest(
                         max(CASE WHEN metric = 'gpu_throttle_hw_thermal' THEN avg_val END),
                         max(CASE WHEN metric = 'gpu_throttle_sw_thermal' THEN avg_val END),
                         max(CASE WHEN metric = 'gpu_throttle_sw_power_cap' THEN avg_val END)
                       ) AS value
                FROM metrics_5m
                WHERE metric IN ('gpu_throttle_hw_thermal', 'gpu_throttle_sw_thermal', 'gpu_throttle_sw_power_cap')
                  AND $__timeFilter(bucket)
                GROUP BY bucket
                ORDER BY bucket
              refId: A
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 60000
              maxDataPoints: 43200
              refId: C
              type: threshold

      - uid: ram-pressure
