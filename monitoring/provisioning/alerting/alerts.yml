              to: 0
            model:
              datasource:
                type: postgres
                uid: timescaledb
              editorMode: code
              format: time_series
              intervalMs: 60000
              maxDataPoints: 43200
              rawQuery: true
              rawSql: |
                SELECT bucket AS time, avg_val AS value
                FROM metrics_5m
                WHERE metric = 'memory_available_bytes'
                  AND $__timeFilter(bucket)
                ORDER BY bucket
              refId: A
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params: [4294967296]
                    type: lt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 60000
              maxDataPoints: 43200
              refId: C
              type: threshold

      - uid: swap-thrashing
        title: Swap Thrashing
        condition: C
        for: 1m
        noDataState: NoData
        execErrState: Error
        annotations:
          summary: Swap I/O rate exceeds 1000 pages/s
        labels:
          severity: critical
        data:
          - refId: A
            datasourceUid: timescaledb
            relativeTimeRange:
              from: 21600
              to: 0
            model:
              datasource:
                type: postgres
                uid: timescaledb
              editorMode: code
              format: time_series
              intervalMs: 60000
              maxDataPoints: 43200
              rawQuery: true
              rawSql: |
                SELECT bucket AS time,
                       (avg_val - lag(avg_val) OVER (ORDER BY bucket))
                       / NULLIF(EXTRACT(EPOCH FROM bucket - lag(bucket) OVER (ORDER BY bucket)), 0) AS value
                FROM metrics_5m
                WHERE metric = 'swap_io_in_pages'
                  AND $__timeFilter(bucket)
                ORDER BY bucket
              refId: A
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params: [1000]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 60000
              maxDataPoints: 43200
              refId: C
              type: threshold

      - uid: gpu-offload
        title: GPU Offload
